services:
  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: oracle-free
    environment:
      ORACLE_PASSWORD: OraclePwd_2025
    ports:
      - "1521:1521"
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 20s
      timeout: 10s
      retries: 30
      start_period: 180s
    volumes:
      - oracle-data:/opt/oracle/oradata

volumes:
  oracle-data:
